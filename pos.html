        function EmployeeSelect({ storeNumber, onSelect, lang, onToggleLang }) {
            const T = (k) => STRINGS[lang][k];
            return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6">

        function POS() {
            const [lang, setLang] = useState('es');
            const T = (k) => STRINGS[lang][k];
            const toggleLang = () => setLang(l => l === 'es' ? 'en' : 'es');
            const [storeNumber, setStoreNumber] = useState(initialStore);
            const [employeeId, setEmployeeId] = useState('');
            const [transactionCounter, setTransactionCounter] = useState(1);
            const [currentReceiptNumber, setCurrentReceiptNumber] = useState('');
            const [trainingMode, setTrainingMode] = useState(false);
            const [showInvoiceInput, setShowInvoiceInput] = useState(false);
            const [trainingInvoiceNumber, setTrainingInvoiceNumber] = useState('');

            const [vehicleMake, setVehicleMake] = useState('');
            const [vehicleMakeSearch, setVehicleMakeSearch] = useState('');
            const [vehicleModel, setVehicleModel] = useState('');
            const [vehicleYear, setVehicleYear] = useState('');
            const [vehicleYearSearch, setVehicleYearSearch] = useState('');
            const [licensePlate, setLicensePlate] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [internalNotes, setInternalNotes] = useState('');
            const [tirePositions, setTirePositions] = useState([]);
            
            const [tireCondition, setTireCondition] = useState('');
            const [tireSize, setTireSize] = useState('');
            const [tireBrand, setTireBrand] = useState('');
            const [tireBrandSearch, setTireBrandSearch] = useState('');
            const [tireSource, setTireSource] = useState('');
            const [tirePrice, setTirePrice] = useState('');
            const [tireQuantity, setTireQuantity] = useState('1');
            const [tireSizeSearch, setTireSizeSearch] = useState('');
            
            const [showServicePopup, setShowServicePopup] = useState(false);
            const [currentServiceName, setCurrentServiceName] = useState('');
            const [servicePrice, setServicePrice] = useState('');
            
            const [terminalCode, setTerminalCode] = useState('');
            const [showPaymentScreen, setShowPaymentScreen] = useState(false);
            const [activePaymentMethod, setActivePaymentMethod] = useState(null); // 'cash'|'p2p'|'card'
            const [amountInput, setAmountInput] = useState('');

            const [otherServiceName, setOtherServiceName] = useState('');
            const [cartItems, setCartItems] = useState([]);
            const [paymentMethod, setPaymentMethod] = useState('');
            const [showSaleComplete, setShowSaleComplete] = useState(false);
            const [showSignaturePopup, setShowSignaturePopup] = useState(false);
            const [pendingReceiptNumber, setPendingReceiptNumber] = useState('');
            const [capturedSignature, setCapturedSignature] = useState(null);
            const [cashPaidAmount, setCashPaidAmount] = useState(0);
            const [p2pPaidAmount, setP2pPaidAmount] = useState(0);
            const [showSourcePopup, setShowSourcePopup] = useState(false);
            const [showNewTireDetailsPopup, setShowNewTireDetailsPopup] = useState(false);
            const signatureCanvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            const filteredTireSizes = useMemo(() => !tireSizeSearch ? TIRE_SIZES : TIRE_SIZES.filter(s => s.includes(tireSizeSearch)), [tireSizeSearch]);
            const filteredBrands = useMemo(() => !tireBrandSearch ? TIRE_BRANDS : TIRE_BRANDS.filter(b => b.toLowerCase().includes(tireBrandSearch.toLowerCase())), [tireBrandSearch]);
            const filteredMakes = useMemo(() => !vehicleMakeSearch ? VEHICLE_MAKES : VEHICLE_MAKES.filter(m => m.toLowerCase().includes(vehicleMakeSearch.toLowerCase())), [vehicleMakeSearch]);
            const filteredYears = useMemo(() => !vehicleYearSearch ? VEHICLE_YEARS : VEHICLE_YEARS.filter(y => y.includes(vehicleYearSearch)), [vehicleYearSearch]);

            useEffect(() => {
                if (!showSignaturePopup) return;
                const canvas = signatureCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const source = e.touches ? e.touches[0] : e;
                    return { x: (source.clientX - rect.left) * scaleX, y: (source.clientY - rect.top) * scaleY };
                };
                const startDraw = (e) => { e.preventDefault(); isDrawingRef.current = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
                const draw = (e) => { e.preventDefault(); if (!isDrawingRef.current) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
                const endDraw = (e) => { e.preventDefault(); isDrawingRef.current = false; };

                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', endDraw);
                return () => {
                    canvas.removeEventListener('mousedown', startDraw);
                    canvas.removeEventListener('mousemove', draw);
                    canvas.removeEventListener('mouseup', endDraw);
                    canvas.removeEventListener('mouseleave', endDraw);
                    canvas.removeEventListener('touchstart', startDraw);
                    canvas.removeEventListener('touchmove', draw);
                    canvas.removeEventListener('touchend', endDraw);
                };
            }, [showSignaturePopup]);

            const openSignaturePopup = () => {
                if (cartItems.length === 0) { alert('Please add items to the sale'); return; }
                if (trainingMode) {
                    setTrainingInvoiceNumber('');
                    setShowInvoiceInput(true);
                    return;
                }
                const receiptNum = generateReceiptNumber();
                setPendingReceiptNumber(receiptNum);
                setShowSignaturePopup(true);
            };

            const confirmTrainingInvoice = () => {
                const num = trainingInvoiceNumber.trim();
                if (!num) { alert(lang === 'es' ? 'Por favor ingresa el número de factura del papel.' : 'Please enter the invoice number from the paper invoice.'); return; }
                setPendingReceiptNumber(num);
                setShowInvoiceInput(false);
                setShowSignaturePopup(true);
            };

            const clearSignature = () => {
                const canvas = signatureCanvasRef.current;
                if (canvas) { const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); }
            };

            const acceptSignature = () => {
                const canvas = signatureCanvasRef.current;
                const dataUrl = canvas ? canvas.toDataURL('image/png') : null;
                setCapturedSignature(dataUrl);
                setShowSignaturePopup(false);
                setCashPaidAmount(0); setP2pPaidAmount(0);
                setActivePaymentMethod(null); setAmountInput(''); setTerminalCode('');
                setShowPaymentScreen(true);
            };

            const toggleTirePosition = (pos) => {
                setTirePositions(tirePositions.includes(pos) ? tirePositions.filter(p => p !== pos) : [...tirePositions, pos]);
            };
            
            const addTire = (addToInventory = false) => {
                if (!tireCondition) { alert('⚠️ PLEASE SELECT TIRE CONDITION ⚠️\n\nYou must click either "USED" or "NEW" before adding a tire.'); return; }
                if (tireCondition === 'new' && !tireBrand) { alert('Please enter the tire brand for new tires.'); return; }
                if (tireCondition === 'new' && !tireSource) { alert('Please select where this tire is coming from:\nFROM OUR STOCK or SPECIAL ORDER'); return; }
                if (!tireSize || !tirePrice || !tireQuantity) { alert('Please fill in tire size, price, and quantity'); return; }
                const price = parseFloat(tirePrice); const qty = parseInt(tireQuantity);
                if (isNaN(price) || price <= 0 || isNaN(qty) || qty <= 0) { alert('Please enter valid price and quantity'); return; }
                const brandLabel = tireCondition === 'new' && tireBrand ? ` ${tireBrand}` : '';
                const description = `${tireCondition.toUpperCase()} Tire${brandLabel} ${displaySize(tireSize)}`;
                const fromInventory = tireCondition === 'new' ? (tireSource === 'stock' ? 1 : 0) : 0;
                setCartItems([...cartItems, { id: Date.now(), type: 'tire', condition: tireCondition, brand: tireBrand || null, fromInventory, description, size: tireSize, price, quantity: qty, total: price * qty, addToInventory }]);
                setTireCondition(''); setTireSize(''); setTireBrand(''); setTireBrandSearch(''); setTireSource(''); setTirePrice(''); setTireQuantity('1'); setTireSizeSearch('');
                setShowNewTireDetailsPopup(false); setShowSourcePopup(false);
            };
            
            const openServicePopup = (name) => { setCurrentServiceName(name); setServicePrice(''); setShowServicePopup(true); };
            const addService = () => {
                const price = parseFloat(servicePrice);
                if (isNaN(price) || price <= 0) { alert('Please enter a valid price'); return; }
                setCartItems([...cartItems, { id: Date.now(), type: 'service', description: currentServiceName, price, quantity: 1, total: price }]);
                setServicePrice(''); setShowServicePopup(false);
            };
            
            // Build human-readable payment label from amounts collected
            const buildPaymentLabel = (cashAmt, p2pAmt, cardAmt) => {
                const parts = [];
                if (cashAmt > 0) parts.push(`Cash $${cashAmt.toFixed(2)}`);
                if (p2pAmt > 0) parts.push(`P2P $${p2pAmt.toFixed(2)}`);
                if (cardAmt > 0) parts.push(`Card $${cardAmt.toFixed(2)}`);
                return parts.join(' + ') || 'Cash';
            };

            // Confirm cash or P2P entry — adds to collected, returns to selection if not fully paid
            const confirmCashOrP2P = () => {
                const entered = parseFloat(amountInput) || 0;
                if (entered <= 0) { alert('Please enter an amount'); return; }
                const newCash = activePaymentMethod === 'cash' ? cashPaidAmount + entered : cashPaidAmount;
                const newP2P  = activePaymentMethod === 'p2p'  ? p2pPaidAmount  + entered : p2pPaidAmount;
                const newRemaining = Math.max(0, subtotal - newCash - newP2P);
                setCashPaidAmount(newCash);
                setP2pPaidAmount(newP2P);
                setActivePaymentMethod(null);
                setAmountInput('');
                if (newRemaining <= 0.005) {
                    const pm = (newCash > 0 || newP2P > 0) ? 'cash' : 'cash';
                    setPaymentMethod(pm);
                    setShowPaymentScreen(false);
                    completeSale(capturedSignature, { cashAmt: newCash, p2pAmt: newP2P, pm });
                }
                // else: back to button selection with updated remaining
            };

            // Confirm card payment — always charges the full remaining + tax
            const confirmCardPayment = () => {
                if (!terminalCode.trim()) { alert('Please enter a terminal confirmation code'); return; }
                const hasNoTax = cashPaidAmount > 0 || p2pPaidAmount > 0;
                const pm = hasNoTax ? 'cash+card' : 'card';
                setPaymentMethod(pm);
                setShowPaymentScreen(false);
                completeSale(capturedSignature, { cashAmt: cashPaidAmount, p2pAmt: p2pPaidAmount, pm });
            };
            
            const removeItem = (id) => { setCartItems(cartItems.filter(item => item.id !== id)); };
            
            const subtotal = cartItems.reduce((sum, item) => sum + item.total, 0);
            // Live remaining balance during payment collection
            const noTaxRemaining = Math.max(0, subtotal - cashPaidAmount - p2pPaidAmount);
            const cardCharge = noTaxRemaining * 1.086;
            // Final tax/total — only meaningful after payment committed (for receipt)
            const cardPortion = paymentMethod ? Math.max(0, subtotal - cashPaidAmount - p2pPaidAmount) : 0;
            const tax = (paymentMethod === 'card' || paymentMethod === 'cash+card') ? cardPortion * 0.086 : 0;
            const total = subtotal + tax;
            
            const generateReceiptNumber = () => {
                const now = new Date();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const year = String(now.getFullYear()).slice(-2);
                const counter = String(transactionCounter).padStart(3, '0');
                return `#${storeNumber}-${month}${day}${year}-${counter}`;
            };
            
            const completeSale = async (signatureDataUrl = null, ov = {}) => {
                // ov (overrides) avoids async state lag when called right after setState
                const fCash = ov.cashAmt ?? cashPaidAmount;
                const fP2P  = ov.p2pAmt  ?? p2pPaidAmount;
                const fPM   = ov.pm      ?? paymentMethod;
                const fCardPre = Math.max(0, subtotal - fCash - fP2P);
                const fTax   = (fPM === 'card' || fPM === 'cash+card') ? fCardPre * 0.086 : 0;
                const fTotal = subtotal + fTax;
                const fCardCharge = fCardPre * 1.086;

                const receiptNum = pendingReceiptNumber || generateReceiptNumber();
                setCurrentReceiptNumber(receiptNum);

                // Save to database
                const paymentLabel = fPM === 'card' ? 'Card' : buildPaymentLabel(fCash, fP2P, fPM === 'cash+card' ? fCardCharge : 0);
                const transactionData = {
                    receipt_number: receiptNum.replace('#', ''),
                    store_number: parseInt(storeNumber),
                    transaction_date: new Date().toISOString().split('T')[0],
                    payment_method: paymentLabel,
                    subtotal: subtotal,
                    tax: fTax,
                    total: fTotal,
                    vehicle_make: vehicleMake || null,

                                    <div>
                                        <label className="block text-sm font-medium mb-1">{T('tire_size')} <span className="text-red-600">*</span></label>
                                        <input type="text" list="tire-sizes-popup" placeholder="..." value={tireSizeSearch}
                                            onChange={(e) => { setTireSizeSearch(e.target.value); setTireSize(e.target.value); }}
                                            className="border-2 border-gray-300 rounded p-2 w-full" />
                                        <datalist id="tire-sizes-popup">{filteredTireSizes.map(s => <option key={s} value={s} />)}</datalist>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-sm font-medium mb-1">{T('price')} <span className="text-red-600">*</span></label>
                                            <input type="number" step="0.01" placeholder="0.00" value={tirePrice} onChange={(e) => setTirePrice(e.target.value)}
                                                className="border-2 border-gray-300 rounded p-2 w-full" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">{T('quantity')} <span className="text-red-600">*</span></label>
                                            <input type="number" min="1" value={tireQuantity} onChange={(e) => setTireQuantity(e.target.value)}
                                                className="border-2 border-gray-300 rounded p-2 w-full" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 pt-1">
                                        <button onClick={() => { setShowNewTireDetailsPopup(false); setShowSourcePopup(true); setTireBrand(''); setTireBrandSearch(''); setTireSize(''); setTireSizeSearch(''); setTirePrice(''); setTireQuantity('1'); }}
                                            className="bg-gray-200 hover:bg-gray-300 font-medium py-3 rounded-lg">{T('cancel')}</button>
                                        <button onClick={() => addTire(false)} className="bg-black text-white font-bold py-3 rounded-lg hover:bg-gray-800">{T('add_tire')}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showServicePopup && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white p-6 rounded shadow-lg w-80">
                                <h3 className="text-xl font-bold mb-4">{currentServiceName} — {T('price')}</h3>
                                <input type="number" step="0.01" placeholder="0.00" value={servicePrice} onChange={(e) => setServicePrice(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') addService(); }} className="border-2 border-gray-300 rounded p-3 w-full mb-4 text-lg" autoFocus />
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => { setShowServicePopup(false); setServicePrice(''); }} className="bg-gray-300 hover:bg-gray-400 font-medium py-2 rounded">{T('cancel')}</button>
                                    <button onClick={addService} className="bg-black text-white font-bold py-2 rounded hover:bg-gray-800">{T('add')}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showPaymentScreen && (() => {
                        const entered = parseFloat(amountInput) || 0;
                        const isCard = activePaymentMethod === 'card';
                        const isCashOrP2P = activePaymentMethod === 'cash' || activePaymentMethod === 'p2p';
                        const change = isCashOrP2P && entered > noTaxRemaining ? entered - noTaxRemaining : 0;
                        const covers = isCashOrP2P && entered >= noTaxRemaining - 0.005;
                        return (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">

                                {/* ── Method selection ── */}
                                {!activePaymentMethod && (
                                    <>
                                        <div className="text-center mb-5">
                                            <p className="text-sm text-gray-500 mb-1">{T('remaining')}</p>
                                            <p className="text-4xl font-bold">${noTaxRemaining.toFixed(2)}</p>
                                            {(cashPaidAmount > 0 || p2pPaidAmount > 0) && (
                                                <p className="text-xs text-gray-400 mt-1">
                                                    {T('collected')} {buildPaymentLabel(cashPaidAmount, p2pPaidAmount, 0)}
                                                </p>
                                            )}
                                        </div>
                                        <p className="text-sm font-medium text-center mb-3">{T('select_method')}</p>
                                        <div className="space-y-3">
                                            <button onClick={() => setActivePaymentMethod('cash')}
                                                className="w-full py-5 text-xl font-bold border-2 border-gray-300 rounded-xl hover:border-black hover:bg-gray-50 active:bg-gray-100">
                                                {T('cash')}
                                            </button>
                                            <button onClick={() => setActivePaymentMethod('p2p')}
                                                className="w-full py-5 text-xl font-bold border-2 border-gray-300 rounded-xl hover:border-black hover:bg-gray-50 active:bg-gray-100">
                                                {T('p2p')}
                                                <div className="text-sm font-normal text-gray-500">{T('p2p_sub')}</div>
                                            </button>
                                            <button onClick={() => { setActivePaymentMethod('card'); setTerminalCode(''); }}
                                                className="w-full py-5 text-xl font-bold border-2 border-blue-400 rounded-xl hover:border-blue-600 hover:bg-blue-50 text-blue-700 active:bg-blue-100">
                                                {T('card')}
                                                <div className="text-sm font-normal text-blue-500">${cardCharge.toFixed(2)} (incl. 8.6% tax)</div>
                                            </button>
                                        </div>
                                        <button onClick={() => { setShowPaymentScreen(false); setCashPaidAmount(0); setP2pPaidAmount(0); }}
                                            className="w-full mt-4 py-2 text-sm text-gray-500 hover:text-gray-700">{T('cancel')}</button>
                                    </>
                                )}

                                {/* ── Cash or P2P amount entry ── */}
                                {isCashOrP2P && (
                                    <>
                                        <h3 className="text-xl font-bold mb-1">
                                            {activePaymentMethod === 'p2p' ? `${T('p2p')} — ${T('p2p_sub')}` : T('cash')}
                                        </h3>
                                        <div className="mb-4 p-3 bg-green-50 border-2 border-green-300 rounded text-center">
                                            <p className="text-sm text-gray-600">{T('amount_due')}</p>
                                            <p className="text-3xl font-bold text-green-700">${noTaxRemaining.toFixed(2)}</p>
                                        </div>
                                        <input type="number" step="0.01" min="0" placeholder="0.00" value={amountInput}
                                            onChange={(e) => setAmountInput(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter') confirmCashOrP2P(); }}
                                            className="border-2 border-gray-300 rounded p-3 w-full text-3xl font-bold text-center mb-3" autoFocus />
                                        {change > 0.005 && (
                                            <div className="mb-3 p-2 bg-blue-50 border border-blue-300 rounded text-center text-sm">
                                                {T('change_due')} <strong>${change.toFixed(2)}</strong>
                                            </div>
                                        )}
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => { setActivePaymentMethod(null); setAmountInput(''); }}
                                                className="bg-gray-300 hover:bg-gray-400 font-medium py-3 rounded">{T('back')}</button>
                                            <button onClick={confirmCashOrP2P}
                                                className={`text-white font-bold py-3 rounded ${covers ? 'bg-green-600 hover:bg-green-700' : 'bg-yellow-500 hover:bg-yellow-600'}`}>
                                                {covers ? T('complete_sale_check') : T('add_to_payment')}
                                            </button>
                                        </div>
                                    </>
                                )}

                                {/* ── Card terminal ── */}
                                {isCard && (
                                    <>
                                        <h3 className="text-xl font-bold mb-3">{T('card_terminal')}</h3>
                                        {(cashPaidAmount > 0 || p2pPaidAmount > 0) && (
                                            <p className="text-sm text-gray-500 mb-3">
                                                {T('collected')} ${(cashPaidAmount + p2pPaidAmount).toFixed(2)}
                                            </p>
                                        )}
                                        <div className="mb-4 p-4 bg-blue-50 border-2 border-blue-300 rounded text-center">
                                            <p className="text-sm text-gray-600">{T('remaining_balance')}</p>
                                            <p className="text-lg text-gray-600">${noTaxRemaining.toFixed(2)} {T('plus_tax')}</p>
                                            <p className="text-4xl font-bold text-blue-700">${cardCharge.toFixed(2)}</p>
                                        </div>
                                        <label className="block text-sm font-bold mb-1">{T('terminal_ref')}</label>
                                        <input type="text" inputMode="numeric" pattern="[0-9]*" placeholder={T('enter_ref')}
                                            value={terminalCode} onChange={(e) => setTerminalCode(e.target.value.replace(/[^0-9]/g, ''))}
                                            onKeyDown={(e) => { if (e.key === 'Enter') confirmCardPayment(); }}
                                            className="border-2 border-gray-300 rounded p-3 w-full text-lg mb-4" autoFocus />
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => { setActivePaymentMethod(null); setTerminalCode(''); }}
                                                className="bg-gray-300 hover:bg-gray-400 font-medium py-3 rounded">{T('back')}</button>
                                            <button onClick={confirmCardPayment}
                                                className="bg-black text-white font-bold py-3 rounded hover:bg-gray-800">{T('complete')}</button>
                                        </div>
                                    </>
                                )}

                            </div>
                        </div>
                        );
                    })()}

                    {showInvoiceInput && (
                        <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">
                                <div className="bg-orange-500 text-white text-center font-bold py-2 px-4 rounded mb-4 text-sm">
                                    ⚠️ {T('training_toggle').toUpperCase()}
                                </div>
                                <h3 className="text-xl font-bold mb-2 text-center">{T('invoice_prompt')}</h3>
                                <p className="text-sm text-gray-500 text-center mb-4">{lang === 'es' ? 'Copia el número exactamente como aparece en el papel' : 'Copy the number exactly as it appears on the paper invoice'}</p>
                                <input
                                    type="text"
                                    placeholder={T('invoice_placeholder')}
                                    value={trainingInvoiceNumber}
                                    onChange={(e) => setTrainingInvoiceNumber(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') confirmTrainingInvoice(); }}
                                    className="border-2 border-orange-400 rounded p-3 w-full text-lg text-center font-bold mb-4 focus:outline-none focus:border-orange-600"
                                    autoFocus
                                />
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setShowInvoiceInput(false)}
                                        className="bg-gray-300 hover:bg-gray-400 font-medium py-3 rounded">
                                        {T('invoice_cancel')}
                                    </button>
                                    <button onClick={confirmTrainingInvoice}
                                        className="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded">
                                        {T('invoice_confirm')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSignaturePopup && (
                        <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-3">
                            <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl flex flex-col" style={{ maxHeight: '97vh' }}>
                                {/* Header */}
                                <div className="p-4 border-b-4 border-black text-center bg-black text-white rounded-t-lg">
                                    <div className="text-2xl font-bold">JAY'S TIRE SHOP #{storeNumber}</div>
                                    <div className="text-sm">{{ '1': '2932 N 16th St, Phoenix, AZ 85016', '2': '2347 E Osborn Rd, Phoenix, AZ 85016', '3': '430 N 16th St, Phoenix, AZ 85006' }[storeNumber]}</div>
                                    <div className="text-lg font-bold mt-1">{T('review_sign')}</div>
                                </div>

                                {/* Scrollable info */}
                                <div className="overflow-y-auto flex-1 p-4 text-sm">
                                    <div className="flex justify-between mb-3 text-gray-600">
                                        <span>Receipt: <strong>{pendingReceiptNumber}</strong></span>
                                        <span>{new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</span>
                                    </div>

                                    {(vehicleMake || vehicleModel || vehicleYear || licensePlate) && (
                                        <div className="mb-3 p-3 bg-gray-50 rounded border">
                                            <div className="font-bold mb-1">Vehicle:</div>
                                            <div>{[vehicleYear, vehicleMake, vehicleModel].filter(Boolean).join(' ') || 'N/A'}{licensePlate ? ` — Plate: ${licensePlate}` : ''}</div>
                                        </div>
                                    )}

                                    <table className="w-full mb-3 border-collapse">
                                        <thead><tr className="border-b-2 border-black"><th className="text-left py-1">Item</th><th className="text-right py-1">Qty</th><th className="text-right py-1">Price</th><th className="text-right py-1">Total</th></tr></thead>
                                        <tbody>
                                            {cartItems.map(item => (
                                                <tr key={item.id} className="border-b border-gray-200">
                                                    <td className="py-1">{item.description}</td>
                                                    <td className="text-right py-1">{item.quantity}</td>
                                                    <td className="text-right py-1">${item.price.toFixed(2)}</td>
                                                    <td className="text-right py-1 font-medium">${item.total.toFixed(2)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>

                                    <div className="flex justify-between mb-1"><span>Subtotal:</span><span>${subtotal.toFixed(2)}</span></div>
                                    <div className="flex justify-between text-xl font-bold border-t-2 border-black pt-2 mb-1"><span>SUBTOTAL:</span><span>${subtotal.toFixed(2)}</span></div>
                                    <p className="text-xs text-gray-500 mb-3 text-right">+8.6% tax applies to card payments</p>

                                    <div className="border-t-2 border-black pt-3 mb-1">
                                        <div className="text-center font-bold text-sm mb-2">{T('all_final')}</div>
                                        <div className="text-xs text-gray-700 leading-relaxed p-2 bg-gray-50 rounded border">
                                            Used tires do NOT have warranty, they are sold as is. All new tires have a 1 (one) year manufacturer warranty unless otherwise specified. Original receipt is required for all new tire warranties.<br /><br />
                                            We are not responsible for any items left behind including but not limited to caps, wheel lugs, locks or keys.<br /><br />
                                            Items left for repair must be paid in full and picked up within 45 days from the date of this receipt. An express mechanic's lien is hereby acknowledged on above vehicle to secure the amount of repairs thereto.<br /><br />
                                            <strong>By signing below you agree to these terms.</strong>
                                        </div>
                                    </div>
                                </div>

                                {/* Signature area */}
                                <div className="p-4 border-t-2 border-black bg-gray-50 rounded-b-lg">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="font-bold">{T('customer_sig')}</span>
                                        <button onClick={clearSignature} className="text-sm bg-gray-300 hover:bg-gray-400 px-3 py-1 rounded font-medium">{T('sig_clear')}</button>
                                    </div>
                                    <canvas ref={signatureCanvasRef} width={700} height={160}
                                        className="border-2 border-gray-400 rounded bg-white w-full"
                                        style={{ touchAction: 'none', cursor: 'crosshair' }} />
                                    <div className="grid grid-cols-2 gap-3 mt-3">
                                        <button onClick={() => setShowSignaturePopup(false)} className="bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 rounded text-lg">{T('sig_back')}</button>
                                        <button onClick={acceptSignature} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded text-lg">{T('accept_complete')}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }
        
        ReactDOM.render(<POS />, document.getElementById('root'));
    </script>
</body>
</html>
